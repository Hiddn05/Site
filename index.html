<!DOCTYPE HTML>
<html lang="en">
    <head>
        <title>Reza | Security Researcher</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
        <style>
            body { background: #0f0c29; background: linear-gradient(to right, #24243e, #302b63, #0f0c29);
                   display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0;
                   font-family: 'Segoe UI', sans-serif; color: #ffffff; overflow: hidden; }
            .card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); padding: 40px;
                    border-radius: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.37); text-align: center;
                    max-width: 400px; width: 90%; border: 1px solid rgba(255,255,255,0.1); }
            .profile-img { width: 80px; height: 80px; background: #e94560; border-radius: 50%;
                           margin: 0 auto 20px; display: flex; align-items: center; justify-content: center;
                           font-size: 32px; font-weight: bold; color: white; }
            h1 { margin: 10px 0; font-size: 22px; }
            p { color: #ccc; line-height: 1.6; font-size: 14px; }
            .tag { display: inline-block; background: #e94560; padding: 4px 10px; border-radius: 5px;
                   font-size: 11px; margin: 5px; text-transform: uppercase; }
        </style>
    </head>
    <body>
        <div class="card">
            <div class="profile-img">R</div>
            <h1>Reza</h1>
            <p>Reverse Engineering | Application Security</p>
            <div style="margin: 15px 0;">
                <span class="tag">Security</span><span class="tag">AI</span><span class="tag">Dev</span>
            </div>
            <p>Exploring the boundaries of software security and building resilient systems for the next generation of web applications.</p>
        </div>
    </body>
</html>
